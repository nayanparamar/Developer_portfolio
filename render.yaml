services:
  - type: web
    name: portfolio-studio
    runtime: python
    buildCommand: ""
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DB_PATH
        value: /var/data/portfolio_studio.db
      - key: SESSION_COOKIE_SECURE
        value: true
    disk:
      name: portfolio-studio-data
      mountPath: /var/data
      sizeGB: 1
